<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelMind — Find Your Perfect Indian Destination</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🗺️</span>
      <span class="logo-text">TravelMind</span>
    </div>
    <p class="tagline">Discover India — powered by search, not hype</p>
  </div>
</header>

<!-- ===== SEARCH PANEL ===== -->
<main class="main">
  <section class="search-panel card">
    <h2 class="section-title">Plan Your Trip</h2>

    <div class="form-grid">
      <!-- City + GPS -->
      <div class="form-group">
        <label for="city">Your City</label>
        <div class="city-row">
          <input type="text" id="city" placeholder="e.g. Delhi, Mumbai, Bangalore" />
          <button class="btn-gps" id="btn-gps" onclick="getGPS()" title="Use my location">
            📍
          </button>
        </div>
        <span class="gps-status" id="gps-status"></span>
      </div>

      <!-- Days -->
      <div class="form-group">
        <label for="days">Number of Days <span id="days-val" class="badge">5</span></label>
        <input type="range" id="days" min="1" max="20" value="5" />
      </div>

      <!-- Budget -->
      <div class="form-group">
        <label for="budget">Budget per Day (INR) <span id="budget-val" class="badge">₹2,000</span></label>
        <input type="range" id="budget" min="500" max="15000" step="500" value="2000" />
      </div>

      <!-- Group type -->
      <div class="form-group">
        <label>Travel Group</label>
        <div class="radio-group">
          <label class="radio-btn"><input type="radio" name="group" value="solo" /> Solo</label>
          <label class="radio-btn"><input type="radio" name="group" value="couple" /> Couple</label>
          <label class="radio-btn active"><input type="radio" name="group" value="friends" checked /> Friends</label>
          <label class="radio-btn"><input type="radio" name="group" value="family" /> Family</label>
        </div>
      </div>

      <!-- Travel month -->
      <div class="form-group">
        <label for="month">Travel Month</label>
        <select id="month">
          <option value="0">Current Month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>

      <!-- Free text -->
      <div class="form-group full-width">
        <label for="query">Describe your trip (optional)</label>
        <input type="text" id="query" placeholder="e.g. peaceful snow mountains for honeymoon, adventure rafting..." />
      </div>
    </div>

    <!-- Vibes -->
    <div class="form-group full-width">
      <label>Travel Vibe <span class="hint">(select all that apply)</span></label>
      <div class="vibes-grid" id="vibes-grid">
        <!-- Injected by JS -->
      </div>
    </div>

    <!-- Results count -->
    <div class="form-group inline-row">
      <label for="top-k">Show up to</label>
      <select id="top-k">
        <option value="15">15 destinations</option>
        <option value="30" selected>30 destinations</option>
        <option value="50">50 destinations</option>
      </select>
    </div>

    <button class="btn-search" id="search-btn" onclick="doSearch()">
      <span class="btn-icon">🔍</span> Find Destinations
    </button>
  </section>

  <!-- ===== TOP PICKS (auto-generated) ===== -->
  <section id="top-picks-section" style="display:none;">
    <div class="top-picks-header">
      <div>
        <h2 class="section-title" style="margin-bottom:.2rem">Top Picks for You</h2>
        <p class="top-picks-sub">Generating personalised travel plans...</p>
      </div>
      <span class="gps-badge" id="gps-badge" style="display:none;">📍 GPS active</span>
    </div>
    <!-- P3: comparison table injected here -->
    <div id="comparison-table-wrap"></div>
    <div class="top-picks-grid" id="top-picks-grid"></div>
  </section>

  <!-- ===== ALL RESULTS (collapsible) ===== -->
  <section class="results-section" id="results-section" style="display:none;">
    <details id="all-results-details">
      <summary class="all-results-summary">
        <span id="results-title">All matching destinations</span>
        <div class="sort-row" onclick="event.stopPropagation()">
          <label for="sort-by">Sort:</label>
          <select id="sort-by" onchange="sortResults()">
            <option value="score">Best Match</option>
            <option value="budget">Lowest Cost</option>
            <option value="popularity">Most Popular</option>
            <option value="vibe_match">Vibe Match</option>
          </select>
        </div>
      </summary>
      <div class="results-grid" id="results-grid"></div>
    </details>
  </section>

  <!-- Loading -->
  <div class="loader" id="loader" style="display:none;">
    <div class="spinner"></div>
    <p>Searching across India...</p>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg" style="display:none;"></div>
</main>

<!-- ===== DETAIL MODAL ===== -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
